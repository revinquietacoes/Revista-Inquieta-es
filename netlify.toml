[build]
  publish = "."
  command = "npm install"

[functions]
  node_bundler = "esbuild"
  
[build.environment]
  SUPABASE_URL = "https://seu-projeto.supabase.co"
  SUPABASE_ANON_KEY = "sb_publishable_..."

[[headers]]
  for = "/*"
  [headers.values]
    X-SUPABASE-URL = "{{ env.SUPABASE_URL }}"
    X-SUPABASE-ANON-KEY = "{{ env.SUPABASE_ANON_KEY }}"