<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Submissões da revista</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Submissões da revista</h1><p>Aqui você acompanha novas submissões, materiais não alocados, convites sem aceite e avaliações em curso.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-editor-chefe.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><section class="panel"><div class="panel-head"><h2>Mapa editorial</h2><div class="actions-row"><span class="badge badge-blue">Novas</span><span class="badge badge-gold">Não alocadas</span><span class="badge badge-green">Em avaliação</span></div></div><div id="sub-grid" class="table-like"></div></section><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['editor_chefe']);if(!user)return;try{const data=await AppPanel.apiData('chief_dashboard');const box=document.getElementById('sub-grid');if(!data.submissoes.length){box.innerHTML='<div class="empty-state">Aqui ainda não há submissões cadastradas.</div>';return;}data.submissoes.forEach(s=>{const row=document.createElement('div');row.className='table-row';row.innerHTML=`<div><div class="item-title">${s.titulo}</div><div class="item-meta">${s.secao} • ${s.autor_nome||'Autor(a) não identificado(a)'}</div></div><div>${s.status}</div><div>${s.dossie_titulo||'Fluxo contínuo'}</div><div>${s.prazo_final_avaliacao?new Date(s.prazo_final_avaliacao).toLocaleDateString('pt-BR'):'—'}</div><div class="actions-row"><a class="btn btn-soft" href="editor-chefe-chat.html">Mensagens</a></div>`;box.appendChild(row)})}catch(err){document.getElementById('sub-grid').innerHTML=`<div class="empty-state">${err.message}</div>`}})</script></body></html>
