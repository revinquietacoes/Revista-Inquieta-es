
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Painel Editor</h1>
<button onclick="load()">Fila editorial</button>
<ul id="lista"></ul>
</div>

<script src="app.js"></script>
<script>
async function load(){
 const d=await AppPanel.apiData("fila_editorial");
 const ul=document.getElementById("lista");
 ul.innerHTML="";
 (d.items||[]).forEach(i=>{
   const li=document.createElement("li");
   li.innerText=i.titulo;
   ul.appendChild(li);
 });
}
</script>
</body>
</html>
