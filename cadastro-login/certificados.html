
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Certificados</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Meus certificados</h1>
<button onclick="load()">Carregar</button>
<ul id="lista"></ul>
</div>

<script src="app.js"></script>
<script>
async function load(){
 const d=await AppPanel.apiData("listar_certificados");
 const ul=document.getElementById("lista");
 ul.innerHTML="";
 (d.certificados||[]).forEach(c=>{
   const li=document.createElement("li");
   const a=document.createElement("a");
   a.href="/.netlify/blobs/"+c.nome_arquivo;
   a.innerText=c.titulo;
   li.appendChild(a);
   ul.appendChild(li);
 });
}
</script>
</body>
</html>
