<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Certificados</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Certificados</h1><p>Aqui você abre a pasta de certificados correspondente ao seu perfil.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="javascript:history.back()">Voltar</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><section class="panel"><div class="panel-head"><h2>Meu acesso</h2></div><div class="note">Aqui você abre a pasta institucional de certificados.</div><div class="actions-row" id="wrap-cert"></div></section><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const u=AppPanel.requireRole(['autor','parecerista','editor_adjunto','editor_chefe']);if(!u)return;const data=await AppPanel.apiData('certificates');document.getElementById('wrap-cert').innerHTML=`<a class="btn btn-primary" href="${data.link}" target="_blank">Abrir certificados</a>`;})</script></body></html>
