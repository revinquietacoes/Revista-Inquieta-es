<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chat interno</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Chat interno</h1><p>Aqui você seleciona um(a) usuário(a), envia mensagens e anexa arquivos.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="javascript:history.back()">Voltar</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><div class="content-grid"><section class="panel"><div class="panel-head"><h2>Conversa</h2></div><div id="chat-body" class="chat-body"></div></section><aside class="panel"><div class="panel-head"><h2>Nova mensagem</h2></div><form id="form-chat"><div class="form-grid"><div class="field full"><label>Destinatário</label><select id="destinatario" name="destinatarioId" required></select></div><div class="field full"><label>Mensagem</label><textarea name="mensagem" required></textarea></div><div class="field full"><label>Anexo (opcional)</label><input name="arquivo" type="file" accept=".png,.jpg,.jpeg,.webp,.pdf,.doc,.docx"></div></div><div class="actions-row"><button class="btn btn-primary" type="submit">Enviar mensagem</button></div><div class="form-message" id="msg-chat"></div></form></aside></div><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['autor','parecerista','editor_adjunto','editor_chefe']);if(!user)return;const sel=document.getElementById('destinatario');const chat=document.getElementById('chat-body');const recipients=await AppPanel.apiData('chat_recipients');recipients.usuarios.filter(u=>u.id!==user.id).forEach(u=>{const o=document.createElement('option');o.value=u.id;o.textContent=`${u.nome} • ${AppPanel.formatRole(u.perfil)}${u.online?' • online':' • offline'}`;sel.appendChild(o)});async function load(){if(!sel.value){chat.innerHTML='<div class="empty-state">Selecione um(a) usuário(a) para abrir a conversa.</div>';return;}const data=await AppPanel.apiData('chat_messages',{targetUserId:Number(sel.value)});chat.innerHTML='';if(!data.mensagens.length){chat.innerHTML='<div class="empty-state">Aqui ainda não há mensagens nesta conversa.</div>';return;}data.mensagens.forEach(m=>{const remetente={nome:m.remetente_nome,perfil:m.remetente_perfil,foto_perfil_url:m.remetente_foto,foto_perfil_aprovada:m.remetente_foto_aprovada,consentimento_foto_publica:m.remetente_foto_consent};const div=document.createElement('div');div.className='message-item';div.innerHTML=`${AppPanel.userChipHtml(remetente,AppPanel.formatRole(remetente.perfil))}<small>${new Date(m.criado_em).toLocaleString('pt-BR')}</small><div>${m.mensagem}</div>${m.anexo_url?`<div style="margin-top:8px"><a class="file-pill" href="${m.anexo_url}" target="_blank">📎 ${m.anexo_nome||'Abrir anexo'}</a></div>`:''}`;chat.appendChild(div)});chat.scrollTop=chat.scrollHeight;}sel.addEventListener('change',load);if(sel.options.length) { sel.selectedIndex=0; load(); } document.getElementById('form-chat').addEventListener('submit',async(e)=>{e.preventDefault();const msg=document.getElementById('msg-chat');msg.className='form-message';const fd=new FormData(e.target);let anexoUrl='',anexoNome='',anexoMime='';const arq=fd.get('arquivo');try{if(arq && typeof arq!=='string' && arq.size){const up=new FormData();up.append('usuario_id',user.id);up.append('categoria','outro');up.append('arquivo',arq);const r=await fetch('/.netlify/functions/upload-material',{method:'POST',body:up});const j=await r.json();if(!r.ok) throw new Error(j.erro||j.detalhe);anexoUrl=j.arquivo.url_acesso;anexoNome=arq.name;anexoMime=arq.type;}await AppPanel.apiAction('send_direct_message',{destinatarioId:Number(fd.get('destinatarioId')),mensagem:fd.get('mensagem'),anexoUrl,anexoNome,anexoMime});msg.textContent='Mensagem enviada com sucesso.';msg.classList.add('ok');e.target.reset();sel.dispatchEvent(new Event('change'));}catch(err){msg.textContent=err.message;msg.classList.add('err')}})})</script></body></html>
