<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chat interno</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Chat interno</h1><p>Aqui você troca mensagens de texto com a equipe e acompanha apenas o histórico dos últimos 10 dias.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-editor-chefe.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><div class="content-grid"><section class="panel"><div class="panel-head"><h2>Mensagens recentes</h2></div><div class="chat-body" id="chat-body"></div></section><aside class="panel"><div class="panel-head"><h2>Nova mensagem</h2></div><form id="form-chat"><div class="form-grid"><div class="field full"><label>Submissão vinculada (opcional)</label><input name="submissaoId" type="number" min="1"></div><div class="field full"><label>Mensagem</label><textarea name="mensagem" required></textarea></div></div><div class="actions-row"><button class="btn btn-primary" type="submit">Enviar mensagem</button></div><div class="form-message" id="msg-chat"></div></form></aside></div><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['editor_chefe']);if(!user)return;const chat=document.getElementById('chat-body');async function load(){try{const data=await AppPanel.apiData('chief_dashboard');chat.innerHTML='';if(!data.mensagens.length){chat.innerHTML='<div class="empty-state">Aqui ainda não há mensagens visíveis.</div>';return;}data.mensagens.forEach(m=>{const div=document.createElement('div');div.className='message-item';div.innerHTML=`<small>${m.remetente_nome||'Sistema'} • ${new Date(m.criado_em).toLocaleString('pt-BR')}</small><div>${m.mensagem}</div><small>${m.submissao_titulo?`Submissão: ${m.submissao_titulo}`:'Mensagem geral'}</small>`;chat.appendChild(div)})}catch(err){chat.innerHTML=`<div class="empty-state">${err.message}</div>`}}load();document.getElementById('form-chat').addEventListener('submit',async(e)=>{e.preventDefault();const msg=document.getElementById('msg-chat');msg.className='form-message';const fd=new FormData(e.target);try{await AppPanel.apiAction('send_message',{submissaoId:fd.get('submissaoId')?Number(fd.get('submissaoId')):null,mensagem:fd.get('mensagem')});msg.textContent='Mensagem enviada com sucesso.';msg.classList.add('ok');e.target.reset();load();}catch(err){msg.textContent=err.message;msg.classList.add('err')}})})</script></body></html>
