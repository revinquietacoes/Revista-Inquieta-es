<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Formulário de parecer</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Formulário de parecer</h1><p>Aqui você registra seu parecer técnico para uso interno da equipe editorial.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="parecerista-avaliacoes.html">Voltar às avaliações</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><section class="panel"><form id="form-parecer"><div class="form-grid"><div class="field"><label>Nome completo do(a) parecerista</label><input name="nomeParecerista" required></div><div class="field"><label>E-mail do(a) parecerista</label><input type="email" name="emailParecerista" required></div><div class="field full"><label>Possui vínculo acadêmico ou institucional?</label><select name="vinculoAcademico" required><option value="">Selecione</option><option value="Sim">Sim</option><option value="Não">Não</option></select></div><div class="field full"><label>Título do trabalho avaliado</label><input name="tituloTrabalho" required></div><div class="field"><label>Tipo de submissão</label><select name="tipoSubmissao" required><option value="">Selecione</option><option value="artigo_cientifico">Artigo científico</option><option value="ensaio_teorico">Ensaio teórico</option><option value="traducao_comentada">Tradução comentada</option><option value="resenha_critica">Resenha crítica</option><option value="relato_experiencia">Relato de experiência</option><option value="fotografia_tematica">Fotografia temática</option><option value="outro">Outro</option></select></div><div class="field"><label>Relevância acadêmica do trabalho</label><select name="relevanciaAcademica" required><option value="muito_alta">Muito alta</option><option value="alta">Alta</option><option value="moderada">Moderada</option><option value="baixa">Baixa</option></select></div><div class="field"><label>Clareza e organização do texto</label><select name="clarezaOrganizacao" required><option value="excelente">Excelente</option><option value="boa">Boa</option><option value="regular">Regular</option><option value="insuficiente">Insuficiente</option></select></div><div class="field"><label>Consistência teórica ou argumentativa</label><select name="consistenciaTeorica" required><option value="muito_consistente">Muito consistente</option><option value="consistente">Consistente</option><option value="parcialmente_consistente">Parcialmente consistente</option><option value="fragil">Frágil</option></select></div><div class="field"><label>Adequação metodológica</label><select name="adequacaoMetodologica" required><option value="adequada">Adequada</option><option value="parcialmente_adequada">Parcialmente adequada</option><option value="insuficiente">Insuficiente</option><option value="nao_se_aplica">Não se aplica</option></select></div><div class="field"><label>Qualidade geral da redação acadêmica</label><select name="qualidadeRedacao" required><option value="excelente">Excelente</option><option value="boa">Boa</option><option value="regular">Regular</option><option value="necessita_revisao_substancial">Necessita revisão substancial</option></select></div><div class="field"><label>O trabalho apresenta contribuição relevante para a área?</label><select name="contribuicaoRelevanteArea" required><option value="sim_claramente">Sim, claramente</option><option value="sim_parcialmente">Sim, parcialmente</option><option value="pouco">Pouco</option><option value="nao">Não</option></select></div><div class="field full"><label>Parecer descritivo para o(a) autor(a)</label><textarea name="comentarioAutor"></textarea></div><div class="field full"><label>Observações internas para a editoria</label><textarea name="comentarioEditor"></textarea></div><div class="field full"><label>Devolutiva (.doc, .docx ou .pdf)</label><input type="file" name="devolutivaArquivo" accept=".doc,.docx,.pdf"></div><div class="field"><label>Parecer final</label><select name="parecerFinal" required><option value="aceitar">Aceitar para publicação</option><option value="aceitar_com_ajustes">Aceitar com ajustes</option><option value="devolver_para_revisao">Devolver para revisão e nova avaliação</option><option value="recusar">Recusar</option></select></div><div class="field"><label>Tempo de avaliação</label><select name="tempoAvaliacao" required><option value="1_dia">1 dia</option><option value="2_dias">2 dias</option><option value="3_dias">3 dias</option><option value="outro">Outro</option></select></div></div><div class="actions-row"><button class="btn btn-primary" type="submit">Enviar parecer</button><button class="btn btn-soft" type="reset">Limpar formulário</button></div><div class="form-message" id="msg-parecer"></div></form></section><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['parecerista']);if(!user)return;const params=new URLSearchParams(location.search);let designacaoId=params.get('designacao');let submissaoId=params.get('submissao');const saved=(()=>{try{return JSON.parse(sessionStorage.getItem('parecerAtual')||'null')}catch{return null}})();if((!designacaoId||designacaoId==='undefined'||designacaoId==='null')&&saved?.designacaoId)designacaoId=String(saved.designacaoId);if((!submissaoId||submissaoId==='undefined'||submissaoId==='null')&&saved?.submissaoId)submissaoId=String(saved.submissaoId);const form=document.getElementById('form-parecer');const msg=document.getElementById('msg-parecer');form.nomeParecerista.value=user.nome||'';form.emailParecerista.value=user.email||'';let avaliacaoAtual=null;const disableForm=(mensagem)=>{msg.textContent=mensagem;msg.className='form-message err';Array.from(form.elements).forEach(el=>{if(!['nomeParecerista','emailParecerista'].includes(el.name))el.disabled=true})};try{const data=await AppPanel.apiData('reviewer_dashboard');if(designacaoId)avaliacaoAtual=data.avaliacoes.find(a=>String(a.id)===String(designacaoId));if(!avaliacaoAtual&&saved?.designacaoId)avaliacaoAtual=data.avaliacoes.find(a=>String(a.id)===String(saved.designacaoId));if(avaliacaoAtual){designacaoId=String(avaliacaoAtual.id);submissaoId=String(avaliacaoAtual.submissao_id);form.tituloTrabalho.value=avaliacaoAtual.titulo||'';sessionStorage.setItem('parecerAtual',JSON.stringify({designacaoId:avaliacaoAtual.id,submissaoId:avaliacaoAtual.submissao_id,titulo:avaliacaoAtual.titulo||''}))}}catch(err){console.error(err);disableForm(err.message||'Não foi possível carregar a avaliação vinculada a este parecer.');return}if(!designacaoId||!avaliacaoAtual){disableForm('Abra este formulário a partir da página “Avaliações atribuídas”.');return}if(!['aceito','em_andamento','concluido'].includes(avaliacaoAtual.status)){disableForm('Esta tarefa ainda não foi aceita. Volte à fila de avaliações, aceite a tarefa e depois abra o formulário.');return}form.addEventListener('submit',async(e)=>{e.preventDefault();msg.className='form-message';msg.textContent='';const fd=new FormData(form);const payload=Object.fromEntries(fd.entries());try{payload.designacaoId=Number(designacaoId);if(submissaoId&&submissaoId!=='undefined'&&submissaoId!=='null')payload.submissaoId=Number(submissaoId);const arq=fd.get('devolutivaArquivo');if(arq&&typeof arq!=='string'&&arq.size){const up=new FormData();up.append('usuario_id',user.id);up.append('submissao_id',submissaoId||String(avaliacaoAtual?.submissao_id||''));up.append('categoria','devolutiva');up.append('arquivo',arq);const r=await fetch('/.netlify/functions/upload-material',{method:'POST',body:up});const j=await r.json();if(!r.ok)throw new Error(j.detalhe||j.erro||'Erro ao enviar arquivo.');payload.devolutivaUrl=j.arquivo.url_acesso;}await AppPanel.apiAction('submit_review',payload);msg.textContent='Parecer registrado com sucesso.';msg.classList.add('ok');sessionStorage.removeItem('parecerAtual');setTimeout(()=>{location.href='parecerista-avaliacoes.html'},900)}catch(err){console.error(err);msg.textContent=err.message||'Erro ao enviar parecer.';msg.classList.add('err')}})})</script></body></html>
