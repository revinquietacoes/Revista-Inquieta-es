<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Parecerista | Revista Inquietações</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <style>
    :root{--muted:#d8deea;--text:#f7f8fb;--card:rgba(255,255,255,.10);--card-line:rgba(255,255,255,.16);--shadow:0 18px 50px rgba(0,0,0,.28)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--text);background:linear-gradient(135deg,#04070d 0%,#09101d 45%,#10284c 100%);min-height:100vh}
    .shell{width:min(1180px,94vw);margin:0 auto;padding:26px 0 34px}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:14px}
    .brand img{width:64px;height:64px;object-fit:contain}
    .brand h1{margin:0;font-family:Georgia,"Times New Roman",serif;font-size:2rem}
    .brand p{margin:4px 0 0;color:var(--muted)}
    .btn{appearance:none;border:none;border-radius:999px;min-height:42px;padding:10px 18px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}
    .btn-secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.16)}
    .hero,.card{background:var(--card);border:1px solid var(--card-line);border-radius:24px;box-shadow:var(--shadow);padding:22px}
    .hero{margin-bottom:18px}
    .hero h2,.card h3{margin:0 0 8px;font-family:Georgia,"Times New Roman",serif}
    .hero p,.card p{margin:0;color:var(--muted);line-height:1.6}
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand">
        <img src="../logo-revista.png" alt="Logo da Revista Inquietações">
        <div>
          <h1>Painel do Parecerista</h1>
          <p>Avaliações e devolutivas</p>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn btn-secondary" href="../index.html">Voltar ao portal</a>
        <button class="btn btn-secondary" id="btn-sair" type="button">Sair</button>
      </div>
    </div>

    <section class="hero">
      <h2 id="titulo-parecerista">Painel do parecerista</h2>
      <p id="texto-parecerista"></p>
    </section>

    <section class="card">
      <h3>Visão inicial</h3>
      <p>Este painel servirá para reunir convites de avaliação, formulários de parecer, prazos e devolutivas aos autores.</p>
    </section>
  </div>

  <script>
    const usuario = JSON.parse(localStorage.getItem('usuario_logado') || 'null');
    if (!usuario) window.location.href = 'login.html';
    if (usuario && usuario.perfil !== 'parecerista') {
      window.location.href = usuario.perfil === 'autor' ? 'painel-autor.html' : 'painel-editor.html';
    }

    document.getElementById('titulo-parecerista').textContent = `Bem-vindo(a), ${usuario.nome}`;
    document.getElementById('texto-parecerista').textContent =
      'Seu acesso foi identificado como parecerista. Aqui poderão ser listadas avaliações em andamento, prazos e devolutivas.';

    document.getElementById('btn-sair').addEventListener('click', () => {
      localStorage.removeItem('usuario_logado');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
