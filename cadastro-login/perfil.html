<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Perfil</title>

    <link rel="icon" href="../assets/favicon.png">
    <link rel="stylesheet" href="painel-base.css">
    <script src="painel-base.js" defer></script>

    <style>
        .avatar-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .avatar-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #ddd;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-drop {

            border: 2px dashed #bbb;
            padding: 25px;
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
            max-width: 300px;
            width: 100%;
            transition: 0.2s;

        }

        .avatar-drop.drag {
            border-color: #2d6cdf;
            background: #f2f6ff;
        }

        .crop-container {
            display: none;
            margin-top: 15px;
        }

        .crop-container canvas {
            max-width: 300px;
            border-radius: 6px;
        }
        
        .form-message {
            margin-top: 10px;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        
        .form-message.error {
            background: #fee;
            color: #c00;
        }
        
        .form-message.success {
            background: #efe;
            color: #060;
        }
    </style>

</head>

<body>

    <div class="page-shell">

        <header class="topbar">

            <div class="brand-wrap">

                <div class="avatar-box">
                    <img class="avatar-img" data-avatar-user alt="">
                    <img class="logo-inline" src="../logo-revista.png">
                </div>

                <div class="brand-copy">
                    <h1>Perfil</h1>
                    <p>Gerencie seus dados e sua foto.</p>
                </div>

            </div>

            <div class="actions-row">
                <a class="btn btn-secondary" href="javascript:history.back()">Voltar</a>
                <button class="btn btn-soft" data-action="logout">Sair</button>
            </div>

        </header>

        <div class="content-grid">

            <section class="panel">

                <div class="panel-head">
                    <h2>Dados cadastrais</h2>
                </div>

                <form id="form-perfil">

                    <div class="form-grid">

                        <div class="field full">
                            <label>Nome</label>
                            <input name="nome" required>
                        </div>

                        <div class="field">
                            <label>E-mail</label>
                            <input name="email" disabled>
                        </div>

                        <div class="field">
                            <label>Perfil</label>
                            <input name="perfil" disabled>
                        </div>

                        <div class="field">
                            <label>Instituição</label>
                            <input name="instituicao">
                        </div>

                        <div class="field">
                            <label>ORCID</label>
                            <input name="orcid">
                        </div>

                        <div class="field full">
                            <label>Lattes</label>
                            <input name="lattes">
                        </div>

                        <div class="field">
                            <label>Origem</label>
                            <input name="origem">
                        </div>

                        <div class="field">
                            <label>Telefone</label>
                            <input name="telefone">
                        </div>

                    </div>

                    <div class="actions-row">
                        <button class="btn btn-primary" type="submit">
                            Salvar perfil
                        </button>
                    </div>

                    <div id="msg-perfil" class="form-message"></div>

                </form>

            </section>

            <aside class="panel">

                <div class="avatar-area">

                    <div class="avatar-preview">
                        <img id="avatar-preview" src="../assets/avatares/avatar-padrao.png">
                    </div>

                    <div id="avatar-drop" class="avatar-drop">
                        Arraste uma imagem aqui ou clique para selecionar
                    </div>

                    <input type="file" id="avatar-input" accept="image/*" hidden>

                    <div class="crop-container">
                        <canvas id="crop-canvas" width="300" height="300"></canvas>

                        <div class="actions-row" style="margin-top:10px">
                            <button id="btn-save-avatar" class="btn btn-primary">
                                Salvar foto
                            </button>
                        </div>
                    </div>

                    <div id="msg-avatar" class="form-message"></div>

                </div>

            </aside>

        </div>

        <footer class="page-footer"></footer>

    </div>

    <script>
    document.addEventListener("DOMContentLoaded", async () => {

        try {
            const data = await AppPanel.apiData("me")
            const u = data.usuario

            // Preencher formulário
            const form = document.getElementById("form-perfil")
            if (form) {
                form.nome.value = u.nome || ""
                form.email.value = u.email || ""
                form.perfil.value = u.perfil || ""
                form.instituicao.value = u.instituicao || ""
                form.orcid.value = u.orcid || ""
                form.lattes.value = u.lattes || ""
                form.origem.value = u.origem || ""
                form.telefone.value = u.telefone || ""
            }

            const preview = document.getElementById("avatar-preview")
            const drop = document.getElementById("avatar-drop")
            const input = document.getElementById("avatar-input")
            const canvas = document.getElementById("crop-canvas")
            const cropBox = document.querySelector(".crop-container")
            const btnSave = document.getElementById("btn-save-avatar")
            const msg = document.getElementById("msg-avatar")

            // CORREÇÃO 1: Verificar se a URL existe e está acessível
            if (u.foto_perfil_url && u.foto_perfil_url !== "null" && u.foto_perfil_url !== "") {
                // Testar se a imagem carrega
                const testImg = new Image()
                testImg.onload = () => {
                    preview.src = u.foto_perfil_url
                    // Atualizar também o avatar do header
                    document.querySelectorAll("[data-avatar-user]").forEach(el => {
                        if (el) el.src = u.foto_perfil_url
                    })
                }
                testImg.onerror = () => {
                    console.log("URL antiga falhou, usando padrão")
                    preview.src = "../assets/avatares/avatar-padrao.png"
                }
                testImg.src = u.foto_perfil_url
            } else {
                preview.src = "../assets/avatares/avatar-padrao.png"
            }

            let cropCtx = canvas.getContext("2d")
            let imgObj = null
            let cropSize = 300

            drop.onclick = () => input.click()

            drop.addEventListener("dragover", e => {
                e.preventDefault()
                drop.classList.add("drag")
            })

            drop.addEventListener("dragleave", () => {
                drop.classList.remove("drag")
            })

            drop.addEventListener("drop", e => {
                e.preventDefault()
                drop.classList.remove("drag")
                const file = e.dataTransfer.files[0]
                if (file) loadImage(file)
            })

            input.addEventListener("change", () => {
                const file = input.files[0]
                if (file) loadImage(file)
            })

            function loadImage(file) {
                if (!file.type.startsWith("image/")) {
                    msg.textContent = "Selecione uma imagem válida."
                    msg.className = "form-message error"
                    return
                }

                const url = URL.createObjectURL(file)
                imgObj = new Image()
                
                imgObj.onload = () => {
                    canvas.width = cropSize
                    canvas.height = cropSize
                    drawCrop()
                    cropBox.style.display = "block"
                    URL.revokeObjectURL(url) // Limpar memória
                    msg.textContent = ""
                    msg.className = "form-message"
                }
                
                imgObj.onerror = () => {
                    msg.textContent = "Erro ao carregar imagem"
                    msg.className = "form-message error"
                }
                
                imgObj.src = url
            }

            function drawCrop() {
                cropCtx.clearRect(0, 0, cropSize, cropSize)
                
                // CORREÇÃO 2: Melhorar o crop para manter proporção
                let size = Math.min(imgObj.width, imgObj.height)
                let sx = (imgObj.width - size) / 2
                let sy = (imgObj.height - size) / 2

                cropCtx.drawImage(
                    imgObj,
                    sx,
                    sy,
                    size,
                    size,
                    0,
                    0,
                    cropSize,
                    cropSize
                )
            }

            btnSave.onclick = async () => {
                msg.textContent = "Enviando..."
                msg.className = "form-message"
                msg.style.color = "#666"

                canvas.toBlob(async blob => {
                    if (!blob) {
                        msg.textContent = "Erro ao processar imagem"
                        msg.className = "form-message error"
                        return
                    }

                    const fd = new FormData()
                    fd.append("arquivo", blob, "avatar.webp")

                    try {
                        // CORREÇÃO 3: Upload sem headers personalizados
                        const r = await fetch("/.netlify/functions/upload-avatar", {
                            method: "POST",
                            body: fd
                        })

                        const data = await r.json()

                        if (!r.ok) {
                            throw new Error(data.erro || "Erro no upload")
                        }

                        // CORREÇÃO 4: Verificar se a URL retornada está correta
                        console.log("URL retornada:", data.url)
                        
                        if (!data.url) {
                            throw new Error("URL não retornada pelo servidor")
                        }

                        // CORREÇÃO 5: Atualizar a foto no banco de dados
                        const updateResponse = await AppPanel.apiData("atualizar-usuario", {
                            id: u.id,
                            campo: "foto_perfil_url",
                            valor: data.url
                        })

                        if (!updateResponse || updateResponse.error) {
                            throw new Error(updateResponse?.error || "Erro ao salvar no banco")
                        }

                        // Atualizar a imagem na tela
                        preview.src = data.url + "?t=" + Date.now() // Forçar refresh

                        document
                            .querySelectorAll("[data-avatar-user]")
                            .forEach(el => {
                                if (el) el.src = data.url + "?t=" + Date.now()
                            })

                        msg.textContent = "Foto atualizada com sucesso!"
                        msg.className = "form-message success"
                        
                        // Esconder o crop após salvar
                        setTimeout(() => {
                            cropBox.style.display = "none"
                            setTimeout(() => {
                                msg.textContent = ""
                                msg.className = "form-message"
                            }, 3000)
                        }, 2000)

                    } catch (err) {
                        console.error("Erro no upload:", err)
                        msg.textContent = err.message
                        msg.className = "form-message error"
                    }
                }, "image/webp", 0.85)
            }

            // Salvar dados do perfil
            const perfilForm = document.getElementById("form-perfil")
            perfilForm.addEventListener("submit", async (e) => {
                e.preventDefault()
                
                const msgPerfil = document.getElementById("msg-perfil")
                msgPerfil.textContent = "Salvando..."
                msgPerfil.className = "form-message"
                
                const formData = new FormData(perfilForm)
                const dados = Object.fromEntries(formData.entries())
                dados.id = u.id
                
                try {
                    const response = await AppPanel.apiData("atualizar-usuario", dados)
                    
                    if (!response || response.error) {
                        throw new Error(response?.error || "Erro ao salvar")
                    }
                    
                    msgPerfil.textContent = "Perfil atualizado com sucesso!"
                    msgPerfil.className = "form-message success"
                    
                    setTimeout(() => {
                        msgPerfil.textContent = ""
                        msgPerfil.className = "form-message"
                    }, 3000)
                    
                } catch (err) {
                    console.error("Erro ao salvar perfil:", err)
                    msgPerfil.textContent = err.message
                    msgPerfil.className = "form-message error"
                }
            })
            
        } catch (err) {
            console.error("Erro ao carregar página:", err)
            const msg = document.getElementById("msg-avatar")
            if (msg) {
                msg.textContent = "Erro ao carregar dados do usuário"
                msg.className = "form-message error"
            }
        }
    })
    </script>

</body>

</html>
