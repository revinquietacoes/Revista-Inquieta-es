<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>

  <link rel="icon" href="../assets/favicon.png">
  <link rel="stylesheet" href="painel-base.css">
  <script src="painel-base.js" defer></script>
</head>
<style>
  #avatar-uploader {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
  }

  #avatar-drop {
    border: 2px dashed #bbb;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    width: 100%;
    max-width: 300px;
  }

  #avatar-drop.drag {
    border-color: #2d6cdf;
    background: #f5f8ff;
  }

  #avatar-canvas {
    border-radius: 50%;
    border: 3px solid #ddd;
    object-fit: cover;
  }

  .crop-actions {
    display: flex;
    gap: 10px;
  }

  #avatar-drop {
    border: 2px dashed #bbb;
    padding: 25px;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
  }

  #avatar-drop.drag {
    border-color: #2d6cdf;
    background: #f4f7ff;
  }

  #avatar-canvas {
    margin-top: 10px;
    border-radius: 50%;
    border: 3px solid #ddd;
  }
</style>

<body>

  <div class="page-shell">

    <!-- HEADER -->
    <header class="topbar">
      <div class="brand-wrap">

        <div class="avatar-box">
          <img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)">
          <img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações">
        </div>

        <div class="brand-copy">
          <h1>Perfil</h1>
          <p>Aqui você consulta e edita seus dados cadastrais e sua foto de perfil.</p>
        </div>

      </div>

      <div class="actions-row">
        <a class="btn btn-secondary" href="javascript:history.back()">Voltar</a>
        <button class="btn btn-soft" data-action="logout">Sair</button>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <div class="content-grid">

      <!-- FORM PERFIL -->
      <section class="panel">
        <div class="panel-head">
          <h2>Dados cadastrais</h2>
        </div>

        <form id="form-perfil">
          <div class="form-grid">

            <div class="field full">
              <label>Nome</label>
              <input name="nome" required>
            </div>

            <div class="field">
              <label>E-mail</label>
              <input name="email" disabled>
            </div>

            <div class="field">
              <label>Perfil</label>
              <input name="perfil" disabled>
            </div>

            <div class="field">
              <label>Instituição</label>
              <input name="instituicao">
            </div>

            <div class="field">
              <label>ORCID</label>
              <input name="orcid">
            </div>

            <div class="field full">
              <label>Lattes</label>
              <input name="lattes">
            </div>

            <div class="field">
              <label>Origem</label>
              <input name="origem">
            </div>

            <div class="field">
              <label>Telefone</label>
              <input name="telefone">
            </div>

            <div class="field full checkbox-line">
              <input type="checkbox" id="receber_noticias_email" name="receber_noticias_email">
              <label for="receber_noticias_email">
                Autorizo o envio de notícias e chamadas da revista por e-mail.
              </label>
            </div>

          </div>

          <div class="actions-row">
            <button class="btn btn-primary" type="submit">Salvar perfil</button>
          </div>

          <div class="form-message" id="msg-perfil"></div>
        </form>
      </section>

      <!-- FOTO DE PERFIL -->
      <div id="avatar-uploader">

        <div id="avatar-drop">
          <p>Clique ou arraste uma foto aqui</p>

          <input type="file" id="avatar-input" accept="image/png,image/jpeg,image/webp">
        </div>

        <canvas id="avatar-canvas" width="300" height="300"></canvas>

        <div class="actions-row">
          <button id="avatar-save" class="btn btn-primary">
            Salvar foto
          </button>
        </div>

        <div class="form-message" id="msg-avatar"></div>

      </div>

    </div>

    <div class="actions-row">
      <button class="btn btn-primary" type="submit">Enviar nova foto</button>
    </div>

    <div class="form-message" id="msg-avatar"></div>
    </form>

    </aside>

  </div>

  <footer class="page-footer"></footer>

  </div>

  <!-- SCRIPT -->
  <script>
    document.addEventListener('DOMContentLoaded', async () => {

      const user = AppPanel.requireRole([
        'autor',
        'parecerista',
        'editor_adjunto',
        'editor_chefe'
      ])

      if (!user) return

      const data = await AppPanel.apiData('me')
      const u = data.usuario
      const drop = document.getElementById("avatar-drop")
      const input = document.getElementById("avatar-input")
      const canvas = document.getElementById("avatar-canvas")
      const ctx = canvas.getContext("2d")

      let avatarBlob = null

      function previewImage(file) {

        if (!file) return

        if (!file.type.startsWith("image/")) {
          alert("Arquivo inválido")
          return
        }

        const img = new Image()

        img.onload = () => {

          canvas.width = 300
          canvas.height = 300

          const size = Math.min(img.width, img.height)

          ctx.clearRect(0, 0, 300, 300)

          ctx.drawImage(
            img,
            (img.width - size) / 2,
            (img.height - size) / 2,
            size,
            size,
            0,
            0,
            300,
            300
          )

          canvas.toBlob(b => {
            avatarBlob = b
          }, "image/jpeg", 0.85)

        }

        img.src = URL.createObjectURL(file)
      }

      input.addEventListener("change", () => {
        previewImage(input.files[0])
      })

      drop.addEventListener("dragover", e => {
        e.preventDefault()
        drop.classList.add("drag")
      })

      drop.addEventListener("dragleave", () => {
        drop.classList.remove("drag")
      })

      drop.addEventListener("drop", e => {
        e.preventDefault()
        drop.classList.remove("drag")

        const file = e.dataTransfer.files[0]
        previewImage(file)
      })

      document
        .getElementById("avatar-save")
        .addEventListener("click", async () => {

          if (!avatarBlob) {
            alert("Selecione uma foto primeiro")
            return
          }

          const fd = new FormData()

          fd.append("arquivo", avatarBlob, "avatar.jpg")
          fd.append("usuario_id", String(u.id))
          fd.append("consentimento", "true")

          const msg = document.getElementById("msg-avatar")
          msg.className = "form-message"

          try {

            const res = await fetch(
              "/.netlify/functions/upload-avatar",
              {
                method: "POST",
                headers: AppPanel.currentUserHeaders(),
                body: fd
              }
            )

            const data = await res.json()

            if (!res.ok) {
              throw new Error(data.erro || "Erro no upload")
            }

            msg.textContent = "Foto atualizada"
            msg.classList.add("ok")

            document
              .querySelectorAll("[data-avatar-user]")
              .forEach(img => {
                img.src = data.url + "?v=" + Date.now()
              })

          } catch (err) {

            msg.textContent = err.message
            msg.classList.add("err")

          }

        })

      const form = document.getElementById('form-perfil')

      // preencher dados
      [
        'nome',
        'email',
        'perfil',
        'instituicao',
        'orcid',
        'lattes',
        'origem',
        'telefone'
      ].forEach(k => {
        if (form.elements[k]) {
          form.elements[k].value = u[k] || ''
        }
      })

      form.elements['perfil'].value = AppPanel.formatRole(u.perfil)
      form.elements['receber_noticias_email'].checked = !!u.receber_noticias_email

      // salvar perfil
      form.addEventListener('submit', async (e) => {
        e.preventDefault()

        const fd = new FormData(form)
        const payload = Object.fromEntries(fd.entries())

        payload.receber_noticias_email =
          form.elements['receber_noticias_email'].checked

        const msg = document.getElementById('msg-perfil')
        msg.className = 'form-message'

        try {
          const res = await AppPanel.apiAction('update_profile', payload)

          AppPanel.applyUserIdentity(res.usuario)

          msg.textContent = 'Perfil atualizado com sucesso.'
          msg.classList.add('ok')

        } catch (err) {
          msg.textContent = err.message
          msg.classList.add('err')
        }
      })

      // upload avatar
      let selectedImage = null

      const drop = document.getElementById("avatar-drop")
      const input = document.getElementById("avatar-input")
      const canvas = document.getElementById("avatar-canvas")
      const ctx = canvas.getContext("2d")

      drop.addEventListener("click", () => input.click())

      drop.addEventListener("dragover", e => {
        e.preventDefault()
        drop.classList.add("drag")
      })

      drop.addEventListener("dragleave", () => {
        drop.classList.remove("drag")
      })

      drop.addEventListener("drop", e => {
        e.preventDefault()
        drop.classList.remove("drag")

        const file = e.dataTransfer.files[0]
        loadImage(file)
      })

      input.addEventListener("change", () => {
        loadImage(input.files[0])
      })

      async function loadImage(file) {

        if (!file) return

        if (!file.type.startsWith("image/")) {
          alert("Arquivo inválido")
          return
        }

        const img = await createImageBitmap(file)

        canvas.width = 300
        canvas.height = 300

        ctx.clearRect(0, 0, 300, 300)

        const size = Math.min(img.width, img.height)

        ctx.drawImage(
          img,
          (img.width - size) / 2,
          (img.height - size) / 2,
          size,
          size,
          0,
          0,
          300,
          300
        )

        selectedImage = canvas
      }

      document
        .getElementById("avatar-save")
        .addEventListener("click", async () => {

          if (!selectedImage) {
            alert("Selecione uma imagem")
            return
          }

          const blob = await new Promise(r =>
            canvas.toBlob(r, "image/jpeg", 0.85)
          )

          const fd = new FormData()

          fd.append("arquivo", blob, "avatar.jpg")
          fd.append("usuario_id", String(u.id))
          fd.append("consentimento", "true")

          const msg = document.getElementById("msg-avatar")
          msg.className = "form-message"

          try {

            const res = await fetch(
              "/.netlify/functions/upload-avatar",
              {
                method: "POST",
                headers: AppPanel.currentUserHeaders(),
                body: fd
              }
            )

            const data = await res.json()

            if (!res.ok) {
              throw new Error(data.erro || "Erro no upload")
            }

            msg.textContent = "Foto atualizada com sucesso"
            msg.classList.add("ok")

            // atualizar avatar na página
            document
              .querySelectorAll("[data-avatar-user]")
              .forEach(img => {
                img.src = data.url + "?t=" + Date.now()
              })

          } catch (err) {

            msg.textContent = err.message
            msg.classList.add("err")

          }

        })
  </script>

</body>

</html>
