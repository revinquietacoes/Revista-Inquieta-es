<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Perfil</title>

<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="painel-base.css">
<script src="painel-base.js" defer></script>

<style>

.avatar-area{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.avatar-preview{
width:150px;
height:150px;
border-radius:50%;
overflow:hidden;
border:3px solid #ddd;
background:#fafafa;
display:flex;
align-items:center;
justify-content:center;
}

.avatar-preview img{
width:100%;
height:100%;
object-fit:cover;
}

.avatar-drop{

border:2px dashed #bbb;
padding:25px;
border-radius:10px;
cursor:pointer;
text-align:center;
max-width:300px;
width:100%;
transition:0.2s;

}

.avatar-drop.drag{
border-color:#2d6cdf;
background:#f2f6ff;
}

.crop-container{
display:none;
margin-top:15px;
}

.crop-container canvas{
max-width:300px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="page-shell">

<header class="topbar">

<div class="brand-wrap">

<div class="avatar-box">
<img class="avatar-img" data-avatar-user alt="">
<img class="logo-inline" src="../logo-revista.png">
</div>

<div class="brand-copy">
<h1>Perfil</h1>
<p>Gerencie seus dados e sua foto.</p>
</div>

</div>

<div class="actions-row">
<a class="btn btn-secondary" href="javascript:history.back()">Voltar</a>
<button class="btn btn-soft" data-action="logout">Sair</button>
</div>

</header>

<div class="content-grid">

<section class="panel">

<div class="panel-head">
<h2>Dados cadastrais</h2>
</div>

<form id="form-perfil">

<div class="form-grid">

<div class="field full">
<label>Nome</label>
<input name="nome" required>
</div>

<div class="field">
<label>E-mail</label>
<input name="email" disabled>
</div>

<div class="field">
<label>Perfil</label>
<input name="perfil" disabled>
</div>

<div class="field">
<label>Instituição</label>
<input name="instituicao">
</div>

<div class="field">
<label>ORCID</label>
<input name="orcid">
</div>

<div class="field full">
<label>Lattes</label>
<input name="lattes">
</div>

<div class="field">
<label>Origem</label>
<input name="origem">
</div>

<div class="field">
<label>Telefone</label>
<input name="telefone">
</div>

</div>

<div class="actions-row">
<button class="btn btn-primary" type="submit">
Salvar perfil
</button>
</div>

<div id="msg-perfil" class="form-message"></div>

</form>

</section>

<aside class="panel">

<div class="avatar-area">

<div class="avatar-preview">
<img id="avatar-preview" src="../assets/avatares/avatar-padrao.png">
</div>

<div id="avatar-drop" class="avatar-drop">
Arraste uma imagem aqui ou clique para selecionar
</div>

<input type="file" id="avatar-input" accept="image/*" hidden>

<div class="crop-container">
<canvas id="crop-canvas"></canvas>

<div class="actions-row" style="margin-top:10px">
<button id="btn-save-avatar" class="btn btn-primary">
Salvar foto
</button>
</div>
</div>

<div id="msg-avatar" class="form-message"></div>

</div>

</aside>

</div>

<footer class="page-footer"></footer>

</div>

<script>

document.addEventListener("DOMContentLoaded", async ()=>{

const data = await AppPanel.apiData("me")
const u = data.usuario

const preview = document.getElementById("avatar-preview")
const drop = document.getElementById("avatar-drop")
const input = document.getElementById("avatar-input")
const canvas = document.getElementById("crop-canvas")
const cropBox = document.querySelector(".crop-container")
const btnSave = document.getElementById("btn-save-avatar")
const msg = document.getElementById("msg-avatar")

preview.src = u.foto_perfil_url || "../assets/avatares/avatar-padrao.png"

let cropCtx = canvas.getContext("2d")
let imgObj = null
let cropSize = 300

drop.onclick = ()=>input.click()

drop.addEventListener("dragover",e=>{
e.preventDefault()
drop.classList.add("drag")
})

drop.addEventListener("dragleave",()=>{
drop.classList.remove("drag")
})

drop.addEventListener("drop",e=>{
e.preventDefault()
drop.classList.remove("drag")

const file = e.dataTransfer.files[0]

if(file) loadImage(file)
})

input.addEventListener("change",()=>{
const file = input.files[0]
if(file) loadImage(file)
})

function loadImage(file){

if(!file.type.startsWith("image/")){
msg.textContent="Selecione uma imagem válida."
return
}

const url = URL.createObjectURL(file)

imgObj = new Image()

imgObj.onload=()=>{

canvas.width=cropSize
canvas.height=cropSize

drawCrop()

cropBox.style.display="block"

}

imgObj.src=url

}

function drawCrop(){

cropCtx.clearRect(0,0,cropSize,cropSize)

let size=Math.min(imgObj.width,imgObj.height)

cropCtx.drawImage(
imgObj,
(imgObj.width-size)/2,
(imgObj.height-size)/2,
size,
size,
0,
0,
cropSize,
cropSize
)

}

btnSave.onclick=async()=>{

msg.textContent="Enviando..."

canvas.toBlob(async blob=>{

const fd=new FormData()

fd.append("arquivo",new File([blob],"avatar.webp",{type:"image/webp"}))
fd.append("usuario_id",u.id)

try{

const r=await fetch("/.netlify/functions/upload-avatar",{
method:"POST",
headers:AppPanel.currentUserHeaders(),
body:fd
})

const data=await r.json()

if(!r.ok){
throw new Error(data.erro || "Erro no upload")
}

preview.src=data.url

document
.querySelectorAll("[data-avatar-user]")
.forEach(el=>el.src=data.url)

msg.textContent="Foto atualizada com sucesso."

}catch(err){

msg.textContent=err.message

}

},"image/webp",0.85)

}

})

</script>

</body>
</html>
