<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pareceristas</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Pareceristas</h1><p>Aqui você consulta a lista real de pareceristas ativos do sistema.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-editor.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><section class="panel"><div class="panel-head"><h2>Lista de pareceristas</h2></div><div class="list" id="lista-pareceristas"></div></section><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['editor_adjunto']);if(!user)return;try{const data=await AppPanel.apiData('editor_dashboard');const box=document.getElementById('lista-pareceristas');if(!data.pareceristas.length){box.innerHTML='<div class="empty-state">Aqui não há pareceristas ativos cadastrados.</div>';return;}data.pareceristas.forEach(p=>{const div=document.createElement('div');div.className='item';div.innerHTML=`${AppPanel.userChipHtml(p,`${p.email} • ${p.instituicao||'Sem instituição'} • ${p.total_avaliacoes} avaliação(ões) • ${p.online?'online':'offline'}`)}<div class="item-meta link-wrap">ORCID: ${p.orcid||'—'}<br>Lattes: ${p.lattes||'—'}</div>`;box.appendChild(div)})}catch(err){document.getElementById('lista-pareceristas').innerHTML=`<div class="empty-state">${err.message}</div>`}})</script></body></html>
