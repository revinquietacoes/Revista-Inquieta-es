<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Login | Revista Inquietações</title>
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="stylesheet" href="painel-base.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #0a0f1c 0%, #0f172a 100%);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow-x: hidden;
  }
  /* fundo animado sutil */
  body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 30%, rgba(59,130,246,0.08) 0%, transparent 50%);
    pointer-events: none;
    animation: slowDrift 20s infinite alternate;
  }
  @keyframes slowDrift {
    0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
    100% { transform: translate(2%, 1%) scale(1.05); opacity: 0.6; }
  }
  .login-container {
    width: min(1200px, 92vw);
    margin: 2rem auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: center;
    backdrop-filter: blur(2px);
  }
  /* lado esquerdo - branding e gif */
  .hero-side {
    text-align: center;
    padding: 1rem;
    animation: fadeInUp 0.6s ease;
  }
  .hero-side img {
    max-width: 280px;
    width: 80%;
    margin-bottom: 1rem;
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.3));
  }
  .hero-side h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    background: linear-gradient(135deg, #fff, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin: 0.5rem 0;
  }
  .hero-side p {
    color: #cbd5e1;
    line-height: 1.6;
    max-width: 400px;
    margin: 0.8rem auto;
  }
  .gif-decoration {
    margin: 1.5rem auto;
    width: 180px;
    height: 180px;
    background: url('https://media.giphy.com/media/LmNwrBhejkK9EFP504/giphy.gif?cid=790b7611h7w6ge9sqs33ur34o71zxo6rrtv3z1ul91b74zpa&ep=v1_gifs_search&rid=giphy.gif&ct=g') center/cover no-repeat;
    border-radius: 50%;
    box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
    animation: float 4s ease-in-out infinite;
    border: 2px solid rgba(59,130,246,0.4);
  }
  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
  }
  /* lado direito - card */
  .login-card {
    background: rgba(17, 24, 39, 0.75);
    backdrop-filter: blur(12px);
    border-radius: 2rem;
    padding: 2rem;
    border: 1px solid rgba(71, 85, 105, 0.5);
    box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
    transition: transform 0.3s ease;
    animation: fadeInRight 0.5s ease;
  }
  .login-card:hover {
    transform: translateY(-4px);
  }
  .login-card h2 {
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 0.2rem;
    color: #f1f5f9;
  }
  .login-card .helper {
    color: #94a3b8;
    margin-bottom: 1.5rem;
    font-size: 0.9rem;
  }
  .form-grid {
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .field label {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #cbd5e1;
  }
  .input-icon {
    position: relative;
  }
  .input-icon i {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: #5b6e8c;
    font-size: 1rem;
  }
  .input-icon input {
    width: 100%;
    padding: 0.9rem 1rem 0.9rem 2.5rem;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 1rem;
    color: #f1f5f9;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .input-icon input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
  }
  .actions-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
    margin-top: 1rem;
    justify-content: space-between;
    align-items: center;
  }
  .btn {
    padding: 0.7rem 1.4rem;
    border-radius: 2rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .btn-primary {
    background: #3b82f6;
    color: white;
    box-shadow: 0 4px 12px rgba(59,130,246,0.3);
  }
  .btn-primary:hover {
    background: #2563eb;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(59,130,246,0.4);
  }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #e2e8f0;
    border: 1px solid rgba(71,85,105,0.5);
  }
  .btn-secondary:hover {
    background: rgba(255,255,255,0.15);
    transform: translateY(-2px);
  }
  .btn-soft {
    background: rgba(255,255,255,0.05);
    color: #cbd5e1;
  }
  .btn-soft:hover {
    background: rgba(255,255,255,0.1);
  }
  .form-message {
    margin-top: 1.2rem;
    padding: 0.7rem;
    border-radius: 1rem;
    font-size: 0.85rem;
    display: none;
  }
  .form-message.ok {
    display: block;
    background: #064e3b;
    color: #a7f3d0;
  }
  .form-message.err {
    display: block;
    background: #7f1d1d;
    color: #fecaca;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @media (max-width: 780px) {
    .login-container { grid-template-columns: 1fr; gap: 1rem; }
    .hero-side .gif-decoration { width: 130px; height: 130px; }
    .login-card { padding: 1.5rem; }
  }
</style>
</head>
<body>
<div class="login-container">
  <div class="hero-side">
    <img src="../logo-revista.png" alt="Revista Inquietações">
    <h1>Sistema editorial</h1>
    <p>Acompanhe submissões, avaliações, dossiês temáticos e mensagens da equipe.</p>
    <div class="gif-decoration"></div>
    <p style="font-size:0.8rem; margin-top:1rem;"><i class="fas fa-leaf"></i> Ciência aberta e colaborativa</p>
  </div>
  <div class="login-card">
    <h2><i class="fas fa-key"></i> Login</h2>
    <p class="helper">Acesse com seu e-mail e senha cadastrados</p>
    <form id="form-login" novalidate>
      <div class="form-grid">
        <div class="field">
          <label>E-mail</label>
          <div class="input-icon">
            <i class="fas fa-envelope"></i>
            <input id="email" name="email" type="email" autocomplete="username" required placeholder="seu@email.com">
          </div>
        </div>
        <div class="field">
          <label>Senha</label>
          <div class="input-icon">
            <i class="fas fa-lock"></i>
            <input id="senha" name="senha" type="password" autocomplete="current-password" required placeholder="••••••••">
          </div>
        </div>
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" id="btn-login" type="submit"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        <a class="btn btn-secondary" href="cadastro.html"><i class="fas fa-user-plus"></i> Criar cadastro</a>
        <a class="btn btn-soft" href="reset-senha.html"><i class="fas fa-redo-alt"></i> Redefinir senha</a>
      </div>
      <div class="form-message" id="msg-login"></div>
    </form>
  </div>
</div>

<script>
  (function () {
    const form = document.getElementById('form-login');
    const msg = document.getElementById('msg-login');
    const emailInput = document.getElementById('email');
    const senhaInput = document.getElementById('senha');
    const btnLogin = document.getElementById('btn-login');

    if (!form || !msg) return;

    async function enviarLogin(event) {
      event.preventDefault();
      msg.className = 'form-message';
      msg.textContent = '';

      const email = emailInput.value.trim();
      const senha = senhaInput.value;

      if (!email || !senha) {
        msg.textContent = 'Informe e-mail e senha.';
        msg.classList.add('err');
        return;
      }

      btnLogin.disabled = true;
      btnLogin.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Entrando...';

      try {
        const res = await fetch(`${window.location.origin}/.netlify/functions/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const contentType = res.headers.get('content-type') || '';
        const raw = await res.text();
        let data = {};

        if (contentType.includes('application/json')) {
          try { data = raw ? JSON.parse(raw) : {}; } catch { throw new Error('Resposta inválida do servidor.'); }
        } else { throw new Error(`Resposta inválida: ${raw || 'vazia'}`); }

        if (!res.ok) throw new Error(data.erro || data.detalhe || 'Erro ao realizar login.');

        localStorage.setItem('usuario_logado', JSON.stringify(data.usuario));

        const perfil = data.usuario.perfil;
        if (perfil === 'autor') window.location.href = 'painel-autor.html';
        else if (perfil === 'parecerista') window.location.href = 'painel-parecerista.html';
        else if (perfil === 'editor_adjunto') window.location.href = 'painel-editor.html';
        else if (perfil === 'editor_chefe') window.location.href = 'painel-editor-chefe.html';
        else throw new Error('Perfil desconhecido.');
      } catch (err) {
        msg.textContent = err.message || 'Erro ao realizar login.';
        msg.classList.add('err');
      } finally {
        btnLogin.disabled = false;
        btnLogin.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
      }
    }

    form.addEventListener('submit', enviarLogin);
  })();
</script>
</body>
</html>
