<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Solicitação de certificados</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Solicitação de certificados</h1><p>Aqui você solicita certificados do evento, minicursos e comunicações orais.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-autor.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><section class="panel"><div class="panel-head"><div><h2>Formulário de solicitação</h2><p class="helper">Aqui você seleciona a modalidade desejada e informa os dados necessários.</p></div></div><form id="form-cert"><div class="form-grid"><div class="field"><label>Nome completo</label><input name="nomeCompleto" required></div><div class="field"><label>E-mail</label><input type="email" name="email" required></div><div class="field full checkbox-line"><input type="checkbox" id="cert-mini" name="certificadoMinicurso"><label for="cert-mini">Certificado de minicurso</label></div><div class="field full checkbox-line"><input type="checkbox" id="cert-geral" name="certificadoParticipacaoGeral"><label for="cert-geral">Certificado de participação geral no evento</label></div><div class="field full checkbox-line"><input type="checkbox" id="cert-com" name="certificadoComunicacaoOral"><label for="cert-com">Certificado de participação em comunicações orais</label></div><div class="field full"><label>Selecione o(s) minicurso(s)</label><textarea name="minicursos" placeholder="Minicurso: O Ser Social e o Preconceito; Minicurso: O Manifesto Comunista; ..."></textarea></div><div class="field full"><label>Autoriza a publicação do texto?</label><select name="autorizaPublicacaoTexto"><option value="">Selecione</option><option value="true">Sim</option><option value="false">Não</option></select></div><div class="field full"><label>Resumo expandido sobre o minicurso</label><textarea name="resumoExpandido"></textarea></div><div class="field"><label>Título da comunicação oral</label><input name="tituloComunicacaoOral"></div><div class="field"><label>Autor(a/es/as) da comunicação</label><input name="autoresComunicacaoOral"></div></div><div class="actions-row"><button class="btn btn-primary" type="submit">Enviar solicitação</button></div><div class="form-message" id="msg-cert"></div></form></section><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',()=>{const user=AppPanel.requireRole(['autor']);if(!user)return;const form=document.getElementById('form-cert');form.nomeCompleto.value=user.nome||'';form.email.value=user.email||'';form.addEventListener('submit',async(e)=>{e.preventDefault();const msg=document.getElementById('msg-cert');msg.className='form-message';msg.textContent='';const fd=new FormData(form);const payload={};fd.forEach((v,k)=>payload[k]=v);payload.certificadoMinicurso=form.certificadoMinicurso.checked;payload.certificadoParticipacaoGeral=form.certificadoParticipacaoGeral.checked;payload.certificadoComunicacaoOral=form.certificadoComunicacaoOral.checked;payload.autorizaPublicacaoTexto=payload.autorizaPublicacaoTexto===''?null:payload.autorizaPublicacaoTexto==='true';try{await AppPanel.apiAction('request_certificate',payload);msg.textContent='Solicitação registrada com sucesso.';msg.classList.add('ok');}catch(err){msg.textContent=err.message;msg.classList.add('err')}})})</script></body></html>
