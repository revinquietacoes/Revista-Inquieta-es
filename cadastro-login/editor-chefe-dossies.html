<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dossiês temáticos | Revista Inquietações</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="painel-base.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="painel-base.js" defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(145deg, #0a0f1c 0%, #0f172a 100%);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: #f1f5f9;
    min-height: 100vh;
  }
  .page-shell {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2rem;
  }
  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1.5rem;
    background: rgba(17, 24, 39, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(71, 85, 105, 0.4);
    border-radius: 2rem;
    padding: 1rem 2rem;
    margin-bottom: 2rem;
  }
  .brand-wrap {
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .avatar-box {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }
  .avatar-img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #3b82f6;
    background: #2d3a5e;
  }
  .logo-inline {
    width: 48px;
    height: 48px;
    border-radius: 16px;
    background: white;
    padding: 6px;
  }
  .brand-copy h1 {
    font-size: 1.6rem;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #94a3b8);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .brand-copy p {
    color: #cbd5e1;
    font-size: 0.85rem;
  }
  .actions-row {
    display: flex;
    gap: 0.8rem;
  }
  .btn {
    padding: 0.5rem 1.2rem;
    border-radius: 2rem;
    font-weight: 600;
    font-size: 0.85rem;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    color: #f1f5f9;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    transition: 0.2s;
  }
  .btn-secondary {
    background: rgba(59,130,246,0.15);
    border: 1px solid rgba(59,130,246,0.4);
  }
  .btn-secondary:hover {
    background: rgba(59,130,246,0.3);
    transform: translateY(-2px);
  }
  .btn-primary {
    background: #3b82f6;
    color: white;
  }
  .btn-primary:hover {
    background: #2563eb;
    transform: translateY(-2px);
  }
  .btn-soft:hover {
    background: rgba(255,255,255,0.1);
  }
  /* Grid */
  .content-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 1.8rem;
  }
  @media (max-width: 800px) {
    .content-grid { grid-template-columns: 1fr; }
  }
  .panel {
    background: rgba(17, 24, 39, 0.85);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(71, 85, 105, 0.4);
    border-radius: 1.5rem;
    padding: 1.5rem;
  }
  .panel-head {
    margin-bottom: 1.2rem;
    border-bottom: 1px solid rgba(71, 85, 105, 0.5);
    padding-bottom: 0.5rem;
  }
  .panel-head h2 {
    font-size: 1.3rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .form-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }
  .field.full {
    grid-column: span 2;
  }
  label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #cbd5e1;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, textarea, select {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 1rem;
    padding: 0.7rem 1rem;
    color: #f1f5f9;
    font-size: 0.9rem;
    transition: 0.2s;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
  }
  textarea {
    min-height: 80px;
    resize: vertical;
  }
  .form-message {
    margin-top: 1rem;
    padding: 0.7rem;
    border-radius: 1rem;
    display: none;
  }
  .form-message.ok {
    display: block;
    background: #064e3b;
    color: #a7f3d0;
  }
  .form-message.err {
    display: block;
    background: #7f1d1d;
    color: #fecaca;
  }
  .list {
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .item {
    background: #1e293b;
    border-radius: 1.2rem;
    padding: 1rem;
    border: 1px solid #334155;
    transition: 0.2s;
  }
  .item:hover {
    background: #334155;
    transform: translateX(4px);
  }
  .item-title {
    font-weight: 700;
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }
  .item-meta {
    font-size: 0.75rem;
    color: #94a3b8;
    margin-top: 0.2rem;
  }
  .empty-state {
    text-align: center;
    padding: 2rem;
    color: #94a3b8;
  }
  footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 0.7rem;
    color: #5b6e8c;
  }
</style>
</head>
<body>
<div class="page-shell">
  <header class="topbar">
    <div class="brand-wrap">
      <div class="avatar-box">
        <img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)">
        <img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações">
      </div>
      <div class="brand-copy">
        <h1><i class="fas fa-layer-group"></i> Dossiês temáticos</h1>
        <p>Aqui você cria dossiês abertos e define o(a) editor(a) responsável.</p>
      </div>
    </div>
    <div class="actions-row">
      <a class='btn btn-secondary' href='/cadastro-login/painel-editor-chefe'><i class="fas fa-arrow-left"></i> Voltar ao painel</a>
      <button class="btn btn-soft" data-action="logout"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
  </header>

  <div class="content-grid">
    <!-- Formulário de criação -->
    <section class="panel">
      <div class="panel-head">
        <h2><i class="fas fa-plus-circle"></i> Novo dossiê</h2>
      </div>
      <form id="form-dossie">
        <div class="form-grid">
          <div class="field full">
            <label><i class="fas fa-heading"></i> Título</label>
            <input name="titulo" required placeholder="Ex: Tecnologias Emergentes na Educação">
          </div>
          <div class="field full">
            <label><i class="fas fa-align-left"></i> Descrição da proposta temática</label>
            <textarea name="descricao" required placeholder="Descreva o escopo, objetivos e prazos do dossiê..."></textarea>
          </div>
          <div class="field">
            <label><i class="fas fa-user-edit"></i> Editor(a) responsável</label>
            <select name="editorResponsavelId" id="editorResponsavelId" required>
              <option value="">-- Selecione um editor adjunto --</option>
            </select>
          </div>
          <div class="field">
            <label><i class="fas fa-calendar-alt"></i> Data de abertura</label>
            <input type="date" name="dataAbertura">
          </div>
          <div class="field">
            <label><i class="fas fa-calendar-times"></i> Data de fechamento</label>
            <input type="date" name="dataFechamento">
          </div>
        </div>
        <div class="actions-row" style="margin-top: 1rem;">
          <button class="btn btn-primary" type="submit"><i class="fas fa-save"></i> Criar dossiê</button>
        </div>
        <div class="form-message" id="msg-dossie"></div>
      </form>
    </section>

    <!-- Listagem de dossiês -->
    <aside class="panel">
      <div class="panel-head">
        <h2><i class="fas fa-list-ul"></i> Dossiês já cadastrados</h2>
      </div>
      <div class="list" id="lista-dossies"></div>
    </aside>
  </div>
  <footer>
    <i class="fas fa-chalkboard"></i> Revista Inquietações – Gestão de dossiês temáticos
  </footer>
</div>

<script>
// Função auxiliar de escape HTML
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  if (typeof AppPanel === 'undefined') {
    const msgDiv = document.getElementById('msg-dossie');
    if (msgDiv) {
      msgDiv.textContent = 'Erro crítico: sistema não inicializado.';
      msgDiv.classList.add('err');
    }
    return;
  }

  // Permissão: editor-chefe (ambas grafias)
  const user = AppPanel.requireRole(['editor_chefe', 'editor-chefe']);
  if (!user) return;

  // 🔧 CORREÇÃO DO AVATAR
  if (typeof AppPanel.atualizarAvatares === 'function') {
    AppPanel.atualizarAvatares();
  } else {
    console.warn('atualizarAvatares não disponível');
  }

  // Carregar dados do dashboard
  let data;
  try {
    data = await AppPanel.apiData('chief_dashboard');
  } catch (err) {
    document.getElementById('lista-dossies').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Erro: ${escapeHtml(err.message)}</div>`;
    return;
  }

  // Preencher select de editores adjuntos
  const select = document.getElementById('editorResponsavelId');
  if (data.usuarios && Array.isArray(data.usuarios)) {
    const adjuntos = data.usuarios.filter(u => u.perfil === 'editor_adjunto' && u.status === 'ativo');
    adjuntos.forEach(u => {
      const opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = escapeHtml(u.nome);
      select.appendChild(opt);
    });
  }

  // Listar dossiês
  const listDiv = document.getElementById('lista-dossies');
  if (!data.dossies || data.dossies.length === 0) {
    listDiv.innerHTML = '<div class="empty-state"><i class="fas fa-folder-open"></i> Ainda não há dossiês cadastrados.</div>';
  } else {
    listDiv.innerHTML = '';
    data.dossies.forEach(d => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div class="item-title"><i class="fas fa-folder"></i> ${escapeHtml(d.titulo)}</div>
        <div class="item-meta">${escapeHtml(d.descricao)}</div>
        <div class="item-meta"><i class="fas fa-user"></i> Editor(a): ${escapeHtml(d.editor_nome || '—')} • <i class="fas fa-tag"></i> Status: ${escapeHtml(d.status)}</div>
      `;
      listDiv.appendChild(div);
    });
  }

  // Submissão do formulário
  const form = document.getElementById('form-dossie');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('msg-dossie');
    msg.className = 'form-message';
    const fd = new FormData(form);
    const payload = Object.fromEntries(fd.entries());
    try {
      await AppPanel.apiAction('create_dossier', payload);
      msg.textContent = '✅ Dossiê criado com sucesso!';
      msg.classList.add('ok');
      form.reset();
      // Recarregar a lista após criação (simples recarga da página)
      setTimeout(() => location.reload(), 1200);
    } catch (err) {
      msg.textContent = `❌ Erro: ${err.message}`;
      msg.classList.add('err');
    }
  });
});
</script>
</body>
</html>
