<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dossiês temáticos</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Dossiês temáticos</h1><p>Aqui você cria dossiês abertos e define o(a) editor(a) responsável.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-editor-chefe.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><div class="content-grid"><section class="panel"><div class="panel-head"><h2>Novo dossiê</h2></div><form id="form-dossie"><div class="form-grid"><div class="field full"><label>Título</label><input name="titulo" required></div><div class="field full"><label>Descrição da proposta temática</label><textarea name="descricao" required></textarea></div><div class="field"><label>Editor(a) responsável</label><select name="editorResponsavelId" id="editorResponsavelId"></select></div><div class="field"><label>Data de abertura</label><input type="date" name="dataAbertura"></div><div class="field"><label>Data de fechamento</label><input type="date" name="dataFechamento"></div></div><div class="actions-row"><button class="btn btn-primary" type="submit">Criar dossiê</button></div><div class="form-message" id="msg-dossie"></div></form></section><aside class="panel"><div class="panel-head"><h2>Dossiês já cadastrados</h2></div><div class="list" id="lista-dossies"></div></aside></div><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['editor_chefe']);if(!user)return;const data=await AppPanel.apiData('chief_dashboard').catch(err=>({erro:err.message}));if(data.erro){document.getElementById('lista-dossies').innerHTML=`<div class="empty-state">${data.erro}</div>`;return;}const select=document.getElementById('editorResponsavelId');data.usuarios.filter(u=>u.perfil==='editor_adjunto'&&u.status==='ativo').forEach(u=>{const opt=document.createElement('option');opt.value=u.id;opt.textContent=u.nome;select.appendChild(opt)});const list=document.getElementById('lista-dossies');if(!data.dossies.length)list.innerHTML='<div class="empty-state">Aqui ainda não há dossiês cadastrados.</div>';else data.dossies.forEach(d=>{const div=document.createElement('div');div.className='item';div.innerHTML=`<div class="item-title">${d.titulo}</div><div class="item-meta">${d.descricao}</div><div class="item-meta">Editor(a): ${d.editor_nome||'—'} • Status: ${d.status}</div>`;list.appendChild(div)});document.getElementById('form-dossie').addEventListener('submit',async(e)=>{e.preventDefault();const msg=document.getElementById('msg-dossie');msg.className='form-message';const fd=new FormData(e.target);const payload=Object.fromEntries(fd.entries());try{await AppPanel.apiAction('create_dossier',payload);msg.textContent='Dossiê criado com sucesso.';msg.classList.add('ok');e.target.reset();}catch(err){msg.textContent=err.message;msg.classList.add('err')}})})</script></body></html>
