<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salas de aula | Revista Inquietações</title>
<link rel="icon" href="../assets/favicon.png">
<link rel="stylesheet" href="painel-base.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="painel-base.js" defer></script>
<style>
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2rem;
    margin-top: 2rem;
  }
  .course-card {
    background: rgba(17, 24, 39, 0.75);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(71, 85, 105, 0.5);
    border-radius: 1.5rem;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .course-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 30px -10px rgba(0,0,0,0.3);
    border-color: #3b82f6;
  }
  .course-thumb {
    width: 100%;
    height: 160px;
    object-fit: cover;
    background: #0f172a;
  }
  .course-info {
    padding: 1.5rem;
  }
  .course-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  .course-category {
    font-size: 0.75rem;
    color: #94a3b8;
    background: #1e293b;
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 1rem;
    margin-bottom: 0.8rem;
  }
  .course-description {
    color: #cbd5e1;
    font-size: 0.9rem;
    margin-bottom: 1.2rem;
  }
  .btn-access {
    background: #3b82f6;
    width: 100%;
    text-align: center;
    border: none;
    border-radius: 2rem;
    padding: 0.6rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  .btn-access:hover {
    background: #2563eb;
    transform: scale(1.02);
  }
  .gif-footer {
    text-align: center;
    margin-top: 3rem;
  }
</style>
</head>
<body>
<div class="page-shell">
  <header class="topbar">
    <div class="brand-wrap">
      <div class="avatar-box">
        <img class="avatar-img" data-avatar-user alt="Avatar">
        <img class="logo-inline" src="../logo-revista.png" alt="Logo">
      </div>
      <div class="brand-copy">
        <h1><i class="fas fa-chalkboard-teacher"></i> Salas de aula</h1>
        <p>Escolha um curso e comece a aprender</p>
      </div>
    </div>
    <div class="actions-row">
      <a class="btn btn-secondary" href="selecao.html"><i class="fas fa-arrow-left"></i> Voltar</a>
      <button class="btn btn-soft" data-action="logout"><i class="fas fa-sign-out-alt"></i> Sair</button>
    </div>
  </header>

  <div class="courses-grid" id="coursesContainer"></div>

  <div class="gif-footer">
    <img src="https://media.giphy.com/media/vFKqnCdLPNOKc/giphy.gif" width="60" alt="gato estudando">
    <p style="margin-top: 0.5rem;">🐱 Vamos aprender juntos?</p>
  </div>
  <footer class="page-footer"></footer>
</div>

<script>
const cursos = [
  { slug: "curso-ser-social-preconceito", titulo: "O Ser Social e o Preconceito: Uma Leitura Comentada", categoria: "Leitura comentada", descricao: "Reflexão crítica sobre o ser social e o preconceito.", thumb: "https://picsum.photos/id/20/400/200" },
  { slug: "curso-nietzsche-valores-modernos", titulo: "Nietzsche e os valores modernos", categoria: "Filosofia", descricao: "Estudo sobre o adoecimento moral do homem moderno.", thumb: "https://picsum.photos/id/1/400/200" },
  { slug: "curso-manifesto-comunista", titulo: "O Manifesto Comunista: O Texto que Mudou o Mundo", categoria: "Teoria social", descricao: "Introdução comentada ao texto de Marx e Engels.", thumb: "https://picsum.photos/id/2/400/200" },
  { slug: "curso-endogenia-academica-tecnologias", titulo: "Endogenia acadêmica e tecnologias", categoria: "Teoria social", descricao: "Processos de endogenia e tecnologia na ciência.", thumb: "https://picsum.photos/id/3/400/200" },
  { slug: "curso-livro-disso", titulo: "Leitura e Comentário do livro O Livro d’Isso", categoria: "Psicanálise", descricao: "Contribuições de Georg Groddeck.", thumb: "https://picsum.photos/id/4/400/200" },
  { slug: "curso-resumo-expandido", titulo: "Como escrever um resumo expandido?", categoria: "Escrita acadêmica", descricao: "Orientações práticas de estrutura e clareza.", thumb: "https://picsum.photos/id/5/400/200" },
  { slug: "curso-algoritmos-do-passado", titulo: "Algoritmos do Passado: IA, História e Ética", categoria: "Tecnologia", descricao: "Discussão sobre IA, historicidade e ética.", thumb: "https://picsum.photos/id/6/400/200" }
];

function renderCursos() {
  const container = document.getElementById('coursesContainer');
  container.innerHTML = cursos.map(curso => `
    <div class="course-card">
      <img class="course-thumb" src="${curso.thumb}" alt="${curso.titulo}">
      <div class="course-info">
        <div class="course-category">${curso.categoria}</div>
        <div class="course-title">${curso.titulo}</div>
        <div class="course-description">${curso.descricao}</div>
        <button class="btn-access" data-slug="${curso.slug}">Acessar curso →</button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.btn-access').forEach(btn => {
    btn.addEventListener('click', () => {
      window.location.href = `${btn.dataset.slug}.html`;
    });
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  if (typeof AppPanel === 'undefined') return;
  const user = AppPanel.requireRole(['autor', 'editor_chefe', 'editor_adjunto']);
  if (!user) return;
  AppPanel.atualizarAvatares();
  renderCursos();
});
</script>
</body>
</html>
