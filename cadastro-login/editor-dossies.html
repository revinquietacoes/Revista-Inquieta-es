<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dossiês sob responsabilidade</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Dossiês sob responsabilidade</h1><p>Aqui você acompanha dossiês temáticos atribuídos ao seu perfil.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-editor.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><section class="panel"><div class="panel-head"><h2>Dossiês</h2></div><div class="list" id="lista-dossies"></div></section><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['editor_adjunto']);if(!user)return;try{const data=await AppPanel.apiData('editor_dashboard');const box=document.getElementById('lista-dossies');if(!data.dossies.length){box.innerHTML='<div class="empty-state">Aqui você ainda não possui dossiês atribuídos.</div>';return;}data.dossies.forEach(d=>{const div=document.createElement('div');div.className='item';div.innerHTML=`<div class="item-title">${d.titulo}</div><div class="item-meta">${d.descricao}</div><div class="item-meta">Editor(a)-chefe criador(a): ${d.criado_por_nome||'—'} • Status: ${d.status}</div>`;box.appendChild(div)})}catch(err){document.getElementById('lista-dossies').innerHTML=`<div class="empty-state">${err.message}</div>`}})</script></body></html>
