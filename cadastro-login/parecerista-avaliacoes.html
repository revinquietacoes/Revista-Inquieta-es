<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Avaliações atribuídas</title><link rel="icon" href="../assets/favicon.png"><link rel="stylesheet" href="painel-base.css"><script src="painel-base.js" defer></script></head><body><div class="page-shell"><header class="topbar"><div class="brand-wrap"><div class="avatar-box"><img class="avatar-img" data-avatar-user alt="Foto do(a) usuário(a)"><img class="logo-inline" src="../logo-revista.png" alt="Logo da Revista Inquietações"></div><div class="brand-copy"><h1>Avaliações atribuídas</h1><p>Aqui você consulta convites, aceita tarefas e acompanha prazos.</p></div></div><div class="actions-row"><a class="btn btn-secondary" href="painel-parecerista.html">Voltar ao painel</a><button class="btn btn-soft" data-action="logout">Sair</button></div></header><div class="content-grid"><section class="panel"><div class="panel-head"><div><h2>Fila de avaliações</h2><p class="helper">Os registros exibem apenas título, resumo, palavras-chave e arquivo principal.</p></div></div><div class="list" id="lista-avaliacoes"></div></section><aside class="panel detail-card is-open" id="detalhe"><h3>Selecione uma avaliação</h3><p class="helper">Aqui você vê os dados essenciais e aciona o formulário de parecer.</p></aside></div><footer class="page-footer"></footer></div><script>document.addEventListener('DOMContentLoaded',async()=>{const user=AppPanel.requireRole(['parecerista']);if(!user)return;try{const data=await AppPanel.apiData('reviewer_dashboard');const lista=document.getElementById('lista-avaliacoes');const detalhe=document.getElementById('detalhe');if(!data.avaliacoes.length){lista.innerHTML='<div class="empty-state">Aqui você ainda não possui avaliações atribuídas.</div>';return;}data.avaliacoes.forEach(a=>{const btn=document.createElement('button');btn.innerHTML=`<div class="item-title">${a.titulo}</div><div class="item-meta">${a.secao} • ${a.status} • prazo: ${a.prazo_parecer?new Date(a.prazo_parecer).toLocaleDateString('pt-BR'):'a definir'}</div>`;btn.addEventListener('click',()=>{detalhe.innerHTML=`<h3>${a.titulo}</h3><div class="note">${a.resumo||'Sem resumo informado.'}</div><div class="detail-grid" style="margin-top:12px"><div class="metric-box"><span class="helper">Palavras-chave</span><strong>${a.palavras_chave||'—'}</strong></div><div class="metric-box"><span class="helper">Arquivo principal</span><strong>${a.nome_arquivo||'Arquivo registrado sem URL pública'}</strong></div><div class="metric-box"><span class="helper">Prazo</span><strong>${a.prazo_parecer?new Date(a.prazo_parecer).toLocaleDateString('pt-BR'):'A definir'}</strong></div><div class="metric-box"><span class="helper">Dias adicionais</span><strong>${a.dias_adicionais||0}</strong></div></div><div class="actions-row"><button class="btn btn-primary" data-id="${a.id}" data-action="aceitar">Aceitar tarefa</button><a class="btn btn-secondary" href="formulario-parecer.html?designacao=${a.id}&submissao=${a.submissao_id}">Abrir formulário</a></div>`;detalhe.querySelector('[data-action="aceitar"]').addEventListener('click',async()=>{await AppPanel.apiAction('update_designacao_status',{designacaoId:a.id,status:'aceito'});alert('Tarefa aceita com sucesso.');location.reload();});});lista.appendChild(btn)});}catch(err){document.getElementById('lista-avaliacoes').innerHTML=`<div class="empty-state">${err.message}</div>`;}})</script></body></html>
