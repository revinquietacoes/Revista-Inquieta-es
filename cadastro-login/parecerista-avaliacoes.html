
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formulário de Parecer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Enviar parecer</h1>
<textarea id="comentario" placeholder="Comentário ao autor"></textarea>
<select id="decisao">
<option value="aceito">Aceito</option>
<option value="rejeitado">Rejeitado</option>
</select>
<button onclick="send()">Enviar</button>
</div>

<script src="app.js"></script>
<script>
async function send(){
 const comentario=document.getElementById("comentario").value;
 const decisao=document.getElementById("decisao").value;
 const r=await AppPanel.apiAction("enviar_parecer",{comentario,decisao});
 alert(JSON.stringify(r));
}
</script>
</body>
</html>
