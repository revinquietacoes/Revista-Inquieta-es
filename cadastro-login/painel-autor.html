
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel do Autor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>Painel do Autor</h1>
<button onclick="load()">Carregar submissões</button>
<ul id="lista"></ul>
<p><a href="certificados.html">Meus certificados</a></p>
</div>

<script src="app.js"></script>
<script>
async function load(){
 const d=await AppPanel.apiData("submissoes_autor");
 const ul=document.getElementById("lista");
 ul.innerHTML="";
 (d.items||[]).forEach(i=>{
   const li=document.createElement("li");
   li.innerText=i.titulo+" - "+i.status;
   ul.appendChild(li);
 });
}
</script>
</body>
</html>
